services:
  mib:
    build:
      context: .
      dockerfile: Dockerfile
    image: mib:latest
    container_name: mib
    restart: unless-stopped
    # Bind ONLY to the host loopback — spec §11bis and §13.
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    environment:
      # Inside the container uvicorn must bind to 0.0.0.0 so docker-proxy
      # can forward requests. LAN exposure is prevented by the loopback
      # port mapping above (`127.0.0.1:8000:8000`), not by this binding.
      API_HOST: "0.0.0.0"
    volumes:
      # Persistent SQLite + any runtime output (chart PNGs, backups).
      - ./data:/app/data
    # Resource budget — host has only 4 GB shared with facturacion, n8n, etc.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.5"
        reservations:
          memory: 256M
          cpus: "0.5"
    mem_swappiness: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 60s
      timeout: 5s
      start_period: 20s
      retries: 3
