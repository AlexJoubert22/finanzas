# pre-commit hooks — spec §12.
# Instalar con: `uv run pre-commit install`
# Ejecutar manualmente en todo el repo: `uv run pre-commit run --all-files`

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        # Solo módulos marcados como strict en el spec §12.
        files: "^src/mib/(ai|services)/|^src/mib/sources/base.py$"
        additional_dependencies:
          - pydantic>=2.9
          - pydantic-settings>=2.6
          - types-pyyaml

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "(^|/)\\.env$|(^|/)uv\\.lock$"
